<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bogensee — Ausstellung</title>
<style>
  :root{
    --bg: #0c0c0c;
    --panel: #1b1b1b;
    --panel-edge: #333333;
    --ink: #ededed;
    --ink-dim: #9c9c9c;
    --accent: #e6e6e6;
    --caption-bg: rgba(12, 12, 12, 0.92);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  /* faint coordinate-grid backdrop */
  #backdrop {
    position: fixed; inset: 0;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 140px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 140px);
    pointer-events: none;
  }

  .tick {
    position: fixed;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: rgba(156,156,156,0.4);
    pointer-events: none;
    z-index: 1;
  }
  .tick.tl { top: 26px; left: 32px; }
  .tick.bl { bottom: 26px; left: 32px; }

  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 2;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 3840px;
    height: 2160px;
    transform-origin: 0 0;
    will-change: transform;
  }

  .item {
    position: absolute;
    background: var(--panel);
    border-top: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7);
    overflow: visible; /* allow sub-tab strip to protrude left of the tab column */
    border-radius: 2px;
  }

  .tile-title {
    flex-shrink: 0;
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-size: 19px;
    letter-spacing: 0.02em;
    color: var(--ink);
    background: var(--caption-bg);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .item-inner {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: visible;
    border-radius: 2px;
    display: flex;
    flex-direction: column;
  }

  .tile-body {
    position: relative;
    flex: 1;
    min-height: 0;
  }

  /* ---------- sequence tile (4 images, tick-scrubber + play) ---------- */
  .seq-image-wrap {
    position: relative;
    width: 100%;
    height: calc(100% - 100px);
    overflow: hidden;
  }
  .seq-image-wrap img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .seq-image-wrap img.active { opacity: 1; }

  .seq-controls {
    height: 100px;
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 26px;
    background: var(--caption-bg);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .seq-play-btn {
    width: 56px; height: 56px;
    flex-shrink: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--panel-edge);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .seq-play-btn svg { width: 22px; height: 22px; fill: var(--ink); }

  .seq-timeline {
    position: relative;
    flex: 1;
    height: 100%;
  }
  .seq-line {
    position: absolute;
    left: 22px; right: 22px;
    top: 40%;
    height: 2px;
    background: rgba(255,255,255,0.16);
    transform: translateY(-50%);
  }
  .seq-point {
    position: absolute;
    top: 40%;
    width: 24px; height: 24px;
    margin-left: -12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 1px solid var(--panel-edge);
    transform: translateY(-50%);
    touch-action: manipulation;
  }
  .seq-point.active { background: var(--accent); border-color: var(--accent); }
  .seq-date {
    position: absolute;
    top: calc(40% + 22px);
    transform: translateX(-50%);
    font-size: 14px;
    letter-spacing: 0.02em;
    color: var(--ink-dim);
    white-space: nowrap;
    pointer-events: none;
  }
  .seq-date.active { color: var(--ink); }

  /* ---------- layered-map tile (side tab column, only one layer visible) ---------- */
  .layer-row {
    height: 100%;
    display: flex;
  }
  .layer-image-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .layer-image-wrap img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }
  .layer-image-wrap img.active { opacity: 1; }

  .layer-tabs {
    width: 210px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--panel-edge);
    background: #161616;
  }
  .layer-tab {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px 10px;
    font-size: 23px;
    line-height: 1.25;
    letter-spacing: 0.02em;
    color: var(--ink-dim);
    border-bottom: 1px solid var(--panel-edge);
    border-left: 4px solid transparent;
    touch-action: manipulation;
  }
  .layer-tab:last-child { border-bottom: none; }
  .layer-tab.active {
    color: var(--ink);
    background: rgba(255,255,255,0.06);
    border-left: 4px solid var(--accent);
  }
  .layer-tab.gap-before { margin-top: 46px; }
  .layer-tab.gap-before::before {
    content: '';
    position: absolute;
    top: -23px; left: 14px; right: 14px;
    border-top: 1px solid var(--panel-edge);
  }

  /* sub-tab strip flying out to the right of a group tab, e.g. "eco value" I–IIII */
  .layer-subrow {
    position: absolute;
    top: 0; left: 100%;
    height: 100%;
    display: none;
    flex-direction: row;
    background: #161616;
    border: 1px solid var(--panel-edge);
    border-left: none;
  }
  .layer-tab.expanded .layer-subrow { display: flex; }
  .layer-subtab {
    width: 66px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    color: var(--ink-dim);
    border-right: 1px solid var(--panel-edge);
    touch-action: manipulation;
  }
  .layer-subtab:last-child { border-right: none; }
  .layer-subtab.active {
    color: var(--ink);
    background: rgba(255,255,255,0.1);
  }

  /* ---------- fixed reset button, unaffected by canvas zoom/pan ---------- */
  #reset-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 20;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(27,27,27,0.92);
    border: 1px solid var(--panel-edge);
    color: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.5);
    touch-action: manipulation;
  }
  #reset-btn svg { width: 20px; height: 20px; fill: none; stroke: var(--ink); stroke-width: 1.6; }
  #reset-btn span {
    font-size: 9px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
</style>
</head>
<body>

<div id="backdrop"></div>
<div class="tick tl">52.6547 N · 13.1861 E</div>
<div class="tick bl">BOGENSEE — DAUERAUSSTELLUNG</div>

<div id="stage">
  <div id="canvas"><!-- items injected by JS from CONFIG --></div>
</div>

<button id="reset-btn" aria-label="Zur Ausgangsansicht">
  <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 3 6.7"/><path d="M3 3v6h6"/></svg>
  <span>Reset</span>
</button>

<script>
/* ============================================================
   INHALT ANPASSEN

   Zwei Kachel-Typen:

   1) "sequence" — vier Bilder, per Zeitstrahl (ein Punkt pro Bild,
      mit Datumstext darunter) einzeln anwählbar, plus Play-Button,
      der automatisch durchblättert (das, was vorher "GIF" genannt
      wurde).
      images: ["bild1.jpg","bild2.jpg","bild3.jpg","bild4.jpg"]
      dates:  ["1990","2005","2015","2024"]  — Text unter jedem Punkt

   2) "layered" — Karte mit Reitern an der rechten Seite,
      immer nur eine Ebene sichtbar. Ein Eintrag kann statt
      "src" ein "subLayers"-Array haben (z.B. "eco value" mit
      den Unter-Reitern I–IIII); die Unter-Reiter erscheinen dann
      links neben dem Haupt-Reiter. "gapBefore: true" fügt einen
      kleinen Abstand vor diesem Reiter ein (visuelle Gruppierung).

   x,y,w,h: Position/Größe auf der 3840x2160-Leinwand (= exakt
   die Bildschirmauflösung, 1 Pixel Leinwand = 1 Pixel Screen).
   ============================================================ */
const CONFIG = [
  {
    type: "sequence",
    label: "Frame 10",
    images: ["frame10-1.jpg", "frame10-2.jpg", "frame10-3.jpg", "frame10-4.jpg"],
    dates: ["Datum 1", "Datum 2", "Datum 3", "Datum 4"],
    x: 50, y: 630, w: 1050, h: 730
  },
  {
    type: "sequence",
    label: "Frame 7",
    images: ["LEAR Biotope map 2.pdf", "frame7-2.jpg", "frame7-3.jpg", "frame7-4.jpg"],
    dates: ["Datum 1", "Datum 2", "Datum 3", "Datum 4"],
    x: 220, y: 1400, w: 1050, h: 730
  },
   {
    type: "layered",
    label: "Frame 8",
    layers: [
      { src: "karte.total.ns.jpg", tab: "Analyse" },
      { src: "ergebnis.jpg", tab: "Ergebnis" },
      {
        tab: "Eco Value",
        gapBefore: true,
        subLayers: [
          { src: "karte.eco.upgrade.ns.jpg", tab: "I" },
          { src: "eunsealing.ns.jpg", tab: "II" },
          { src: "ecovalue-3.jpg", tab: "III" },
          { src: "ecovalue-4.jpg", tab: "IIII" }
        ]
      },
      { src: "karte.weakness.jpg", tab: "Weakness" },
      { src: "state.ownership.png", tab: "State Owned" },
      { src: "data-gap.jpg", tab: "Data Gap" }
    ],
    x: 1180, y: 260, w: 1480, h: 1040
  },
  {
    type: "sequence",
    label: "Frame 6",
    images: ["bogensee.plan.jpg", "bogensee.plan.later.jpg", "frame6-3.jpg", "frame6-4.jpg"],
    dates: ["Datum 1", "Datum 2", "Datum 3", "Datum 4"],
    x: 3080, y: 240, w: 700, h: 1080
  },
  {
    type: "sequence",
    label: "Frame 9",
    images: ["frame9-1.jpg", "frame9-2.jpg", "frame9-3.jpg", "frame9-4.jpg"],
    dates: ["Datum 1", "Datum 2", "Datum 3", "Datum 4"],
    x: 2760, y: 1330, w: 1020, h: 800
  }
];

/* ============================================================
   Ab hier nichts mehr anpassen (Logik für Zoom/Pan/Play/Reiter)
   ============================================================ */
const CANVAS_W = 3840, CANVAS_H = 2160;
const canvas = document.getElementById('canvas');
const stage = document.getElementById('stage');

// Prevent the browser's own page-zoom (trackpad pinch / ctrl+scroll / Safari
// gesture events) from engaging — otherwise it fights with our custom canvas
// zoom and can visually detach "position: fixed" elements like the reset
// button. Instead, we redirect trackpad pinch into our own canvas zoom, so
// testing on a laptop trackpad behaves the same as pinching on the real
// touchscreen.
function zoomAt(clientX, clientY, newScaleRaw) {
  const newScale = Math.max(MIN_SCALE, Math.min(newScaleRaw, MAX_SCALE));
  const rect = stage.getBoundingClientRect();
  const mx = clientX - rect.left, my = clientY - rect.top;
  const canvasX = (mx - tx) / scale;
  const canvasY = (my - ty) / scale;
  tx = mx - canvasX * newScale;
  ty = my - canvasY * newScale;
  scale = newScale;
  applyTransform();
}

document.addEventListener('wheel', (e) => {
  if (e.ctrlKey) {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.01);
    zoomAt(e.clientX, e.clientY, scale * factor);
  }
}, { passive: false });

let gestureBaseScale = 1;
document.addEventListener('gesturestart', (e) => {
  e.preventDefault();
  gestureBaseScale = scale;
});
document.addEventListener('gesturechange', (e) => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, gestureBaseScale * e.scale);
});
document.addEventListener('gestureend', (e) => e.preventDefault());

const PLAY_SVG = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const PAUSE_SVG = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

// per-tile runtime state for sequence players
const sequenceState = new WeakMap();

CONFIG.forEach((entry) => {
  const item = document.createElement('div');
  item.className = 'item';
  item.style.left = entry.x + 'px';
  item.style.top = entry.y + 'px';
  item.style.width = entry.w + 'px';
  item.style.height = entry.h + 'px';

  const inner = document.createElement('div');
  inner.className = 'item-inner';
  item.appendChild(inner);

  const titleEl = document.createElement('div');
  titleEl.className = 'tile-title';
  titleEl.textContent = entry.label;
  inner.appendChild(titleEl);

  const body = document.createElement('div');
  body.className = 'tile-body';
  inner.appendChild(body);

  if (entry.type === 'sequence') {
    const imageWrap = document.createElement('div');
    imageWrap.className = 'seq-image-wrap';
    const imgEls = entry.images.map((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = entry.label + ' – Bild ' + (i + 1);
      if (i === 0) img.classList.add('active');
      imageWrap.appendChild(img);
      return img;
    });

    const controls = document.createElement('div');
    controls.className = 'seq-controls';

    const playBtn = document.createElement('div');
    playBtn.className = 'seq-play-btn';
    playBtn.innerHTML = PLAY_SVG;

    const timeline = document.createElement('div');
    timeline.className = 'seq-timeline';
    const line = document.createElement('div');
    line.className = 'seq-line';
    timeline.appendChild(line);

    const n = imgEls.length;
    const pointEls = [];
    imgEls.forEach((_, i) => {
      const leftExpr = 'calc(22px + (100% - 44px) * ' + (i / (n - 1)) + ')';

      const pt = document.createElement('div');
      pt.className = 'seq-point' + (i === 0 ? ' active' : '');
      pt.style.left = leftExpr;
      timeline.appendChild(pt);
      pointEls.push(pt);

      const dateLabel = document.createElement('div');
      dateLabel.className = 'seq-date' + (i === 0 ? ' active' : '');
      dateLabel.style.left = leftExpr;
      dateLabel.textContent = (entry.dates && entry.dates[i]) || ('Datum ' + (i + 1));
      timeline.appendChild(dateLabel);
    });

    controls.appendChild(playBtn);
    controls.appendChild(timeline);
    body.appendChild(imageWrap);
    body.appendChild(controls);

    sequenceState.set(item, {
      imgEls, tickEls: pointEls, dateEls: timeline.querySelectorAll('.seq-date'),
      playBtn, idx: 0, playing: false, timer: null
    });

  } else if (entry.type === 'layered') {
    const row = document.createElement('div');
    row.className = 'layer-row';

    const imageWrap = document.createElement('div');
    imageWrap.className = 'layer-image-wrap';

    const tabs = document.createElement('div');
    tabs.className = 'layer-tabs';

    let firstImageAssigned = false;

    entry.layers.forEach((layer) => {
      const tab = document.createElement('div');
      tab.className = 'layer-tab' + (layer.gapBefore ? ' gap-before' : '');
      tab.textContent = layer.tab;

      if (layer.subLayers) {
        const subrow = document.createElement('div');
        subrow.className = 'layer-subrow';
        layer.subLayers.forEach((sub, si) => {
          const img = document.createElement('img');
          img.src = sub.src;
          img.alt = sub.tab;
          if (!firstImageAssigned && si === 0) { img.classList.add('active'); }
          imageWrap.appendChild(img);

          const subtab = document.createElement('div');
          subtab.className = 'layer-subtab' + (!firstImageAssigned && si === 0 ? ' active' : '');
          subtab.textContent = sub.tab;
          subrow.appendChild(subtab);
        });
        if (!firstImageAssigned) {
          tab.classList.add('active', 'expanded');
          firstImageAssigned = true;
        }
        tab.appendChild(subrow);
      } else {
        const img = document.createElement('img');
        img.src = layer.src;
        img.alt = layer.tab;
        if (!firstImageAssigned) { img.classList.add('active'); tab.classList.add('active'); firstImageAssigned = true; }
        imageWrap.appendChild(img);
      }

      tabs.appendChild(tab);
    });

    row.appendChild(imageWrap);
    row.appendChild(tabs);
    body.appendChild(row);
  }

  canvas.appendChild(item);
});

// --- sequence player logic ---
function seqSetActive(state, idx) {
  state.idx = idx;
  state.imgEls.forEach((im, k) => im.classList.toggle('active', k === idx));
  state.tickEls.forEach((t, k) => t.classList.toggle('active', k === idx));
  state.dateEls.forEach((d, k) => d.classList.toggle('active', k === idx));
}
function seqStart(state) {
  if (state.playing) return;
  state.playing = true;
  state.playBtn.innerHTML = PAUSE_SVG;
  state.timer = setInterval(() => {
    seqSetActive(state, (state.idx + 1) % state.imgEls.length);
  }, 1100);
}
function seqStop(state) {
  state.playing = false;
  state.playBtn.innerHTML = PLAY_SVG;
  clearInterval(state.timer);
}

// --- layered-map tab logic ---
function layerActivateMainTab(tabEl, imageWrap) {
  const tabsContainer = tabEl.parentElement;
  const allTabs = Array.from(tabsContainer.children);
  const allImgs = Array.from(imageWrap.querySelectorAll('img'));

  // find which image index this plain tab corresponds to by matching
  // its position among non-subLayer tabs — simpler: store direct ref
  allTabs.forEach((t) => { t.classList.remove('active', 'expanded'); });
  tabEl.classList.add('active');

  const imgToShow = tabEl._directImg;
  allImgs.forEach((im) => im.classList.toggle('active', im === imgToShow));
}

function layerActivateGroupTab(tabEl) {
  const tabsContainer = tabEl.parentElement;
  Array.from(tabsContainer.children).forEach((t) => t.classList.remove('active', 'expanded'));
  tabEl.classList.add('active', 'expanded');
}

function layerActivateSubtab(subtabEl, idxWithinGroup) {
  const groupTab = subtabEl.closest('.layer-tab');
  const row = groupTab.closest('.layer-row');
  const imageWrap = row.querySelector('.layer-image-wrap');
  const subrow = groupTab.querySelector('.layer-subrow');

  Array.from(subrow.children).forEach((s, k) => s.classList.toggle('active', k === idxWithinGroup));

  const groupImgs = subtabEl._siblingImgs;
  const allImgs = Array.from(imageWrap.querySelectorAll('img'));
  allImgs.forEach((im) => im.classList.toggle('active', groupImgs[idxWithinGroup] === im));
}

// wire up direct references now that DOM exists (avoids fragile index math on tap)
CONFIG.forEach((entry, ei) => {
  if (entry.type !== 'layered') return;
  const item = canvas.children[ei];
  const tabsContainer = item.querySelector('.layer-tabs');
  const imageWrap = item.querySelector('.layer-image-wrap');
  const allImgs = Array.from(imageWrap.querySelectorAll('img'));
  let imgCursor = 0;

  Array.from(tabsContainer.children).forEach((tabEl, ti) => {
    const layer = entry.layers[ti];
    if (layer.subLayers) {
      const subrow = tabEl.querySelector('.layer-subrow');
      const groupImgs = layer.subLayers.map(() => allImgs[imgCursor++]);
      Array.from(subrow.children).forEach((subtabEl, si) => {
        subtabEl._siblingImgs = groupImgs;
        subtabEl._groupIndex = si;
      });
    } else {
      tabEl._directImg = allImgs[imgCursor++];
    }
  });
});

// --- pan & zoom (pointer-events based, multi-touch pinch) ---
let scale = 1, tx = 0, ty = 0;
const MIN_SCALE = 0.35, MAX_SCALE = 4;
const pointers = new Map();
let dragMoved = false;
let lastDist = null;
let lastSingle = null;

function applyTransform() {
  canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function centerCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const fitScale = Math.min(vw / CANVAS_W, vh / CANVAS_H);
  scale = Math.max(MIN_SCALE, Math.min(fitScale, MAX_SCALE));
  tx = (vw - CANVAS_W * scale) / 2;
  ty = (vh - CANVAS_H * scale) / 2;
  applyTransform();
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function mid(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

stage.addEventListener('pointerdown', (e) => {
  stage.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  dragMoved = false;
  if (pointers.size === 1) {
    lastSingle = { x: e.clientX, y: e.clientY };
  } else if (pointers.size === 2) {
    const pts = Array.from(pointers.values());
    lastDist = dist(pts[0], pts[1]);
  }
});

stage.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1 && lastSingle) {
    const dx = e.clientX - lastSingle.x;
    const dy = e.clientY - lastSingle.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    tx += dx; ty += dy;
    lastSingle = { x: e.clientX, y: e.clientY };
    applyTransform();
  } else if (pointers.size === 2) {
    const pts = Array.from(pointers.values());
    const d = dist(pts[0], pts[1]);
    const m = mid(pts[0], pts[1]);
    if (lastDist) {
      const factor = d / lastDist;
      const newScale = Math.max(MIN_SCALE, Math.min(scale * factor, MAX_SCALE));
      const rect = stage.getBoundingClientRect();
      const mx = m.x - rect.left, my = m.y - rect.top;
      const canvasX = (mx - tx) / scale;
      const canvasY = (my - ty) / scale;
      tx = mx - canvasX * newScale;
      ty = my - canvasY * newScale;
      scale = newScale;
      dragMoved = true;
      applyTransform();
    }
    lastDist = d;
  }
});

function endPointer(e) {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) { lastDist = null; }
  if (pointers.size === 1) {
    lastSingle = Array.from(pointers.values())[0];
  } else if (pointers.size === 0) {
    lastSingle = null;
  }
}

// Unified tap handling: the stage holds pointer capture (needed for smooth
// pan/pinch), so a plain "click" on a nested control is not reliable across
// browsers/input types. Instead we look up what's actually under the
// pointer at release time and act on it directly.
let lastTap = 0;

function handlePointerUp(e) {
  const wasSinglePointer = pointers.size === 1;
  endPointer(e);

  if (!wasSinglePointer || dragMoved) { lastTap = 0; return; }

  const target = document.elementFromPoint(e.clientX, e.clientY);
  let hitInteractive = false;

  if (target) {
    const subtabEl = target.closest('.layer-subtab');
    const tabEl = !subtabEl ? target.closest('.layer-tab') : null;
    const playBtnEl = target.closest('.seq-play-btn');
    const tickEl = !playBtnEl ? target.closest('.seq-point') : null;

    if (subtabEl) {
      hitInteractive = true;
      const subrow = subtabEl.parentElement;
      const idx = Array.from(subrow.children).indexOf(subtabEl);
      layerActivateSubtab(subtabEl, idx);
    } else if (tabEl) {
      hitInteractive = true;
      const item = tabEl.closest('.item');
      const imageWrap = item.querySelector('.layer-image-wrap');
      const layerHasSubtabs = !!tabEl.querySelector('.layer-subrow');
      if (layerHasSubtabs) {
        layerActivateGroupTab(tabEl);
      } else {
        layerActivateMainTab(tabEl, imageWrap);
      }
    } else if (playBtnEl) {
      hitInteractive = true;
      const item = playBtnEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) { state.playing ? seqStop(state) : seqStart(state); }
    } else if (tickEl) {
      hitInteractive = true;
      const item = tickEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) {
        const idx = state.tickEls.indexOf(tickEl);
        seqStop(state);
        seqSetActive(state, idx);
      }
    }
  }

  if (!hitInteractive) {
    const now = Date.now();
    if (now - lastTap < 300) centerCanvas();
    lastTap = now;
  } else {
    lastTap = 0;
  }
}

stage.addEventListener('pointerup', handlePointerUp);
stage.addEventListener('pointercancel', endPointer);

document.getElementById('reset-btn').addEventListener('click', centerCanvas);
window.addEventListener('resize', centerCanvas);
centerCanvas();
</script>
</body>
</html>
