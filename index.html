<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bogensee — Ausstellung</title>
<style>
  :root{
    --bg: #0c0c0c;
    --panel: #1b1b1b;
    --panel-edge: #333333;
    --ink: #ededed;
    --ink-dim: #9c9c9c;
    --accent: #e6e6e6;
    --caption-bg: rgba(12, 12, 12, 0.92);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: "Courier New", Courier, monospace;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  #backdrop {
    position: fixed; inset: 0;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 140px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0, rgba(255,255,255,0.045) 1px, transparent 1px, transparent 140px);
    pointer-events: none;
  }

  .tick {
    position: fixed;
    font-size: 20px;
    letter-spacing: 0.02em;
    color: rgba(156,156,156,0.4);
    pointer-events: none;
    z-index: 1;
  }
  .tick.tl { top: 26px; left: 32px; }
  .tick.bl { bottom: 26px; left: 32px; }
  .tick.tr { top: 26px; right: 32px; }

  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 2;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 3840px;
    height: 2160px;
    transform-origin: 0 0;
  }

  .item {
    position: absolute;
    overflow: visible;
  }

  .item-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .tile-title {
    flex-shrink: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 19px;
    letter-spacing: 0.02em;
    color: var(--ink);
    background: var(--caption-bg);
    border: 1px solid rgba(255,255,255,0.14);
    border-bottom: none;
  }

  /* ---------- the actual DIN-A / 5:4 framed image box ---------- */
  .tile-frame {
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--panel);
    outline: 1px solid rgba(255,255,255,0.16);
    outline-offset: -1px;
  }
  .frame-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .frame-img.active { opacity: 1; }

  .finance-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-edge);
    color: var(--ink-dim);
    border-radius: 3px;
    touch-action: manipulation;
  }
  .finance-btn.active {
    color: var(--ink);
    background: rgba(255,255,255,0.14);
    border-color: var(--accent);
  }

  /* ---------- sequence controls: sits BELOW the frame, external ---------- */
  .seq-controls {
    flex-shrink: 0;
    height: 90px;
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 26px;
    background: var(--caption-bg);
    border: 1px solid var(--panel-edge);
  }

  .seq-play-btn {
    width: 52px; height: 52px;
    flex-shrink: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--panel-edge);
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .seq-play-btn svg { width: 20px; height: 20px; fill: var(--ink); }

  .seq-timeline {
    position: relative;
    flex: 1;
    height: 100%;
  }
  .seq-line {
    position: absolute;
    left: 22px; right: 22px;
    top: 38%;
    height: 2px;
    background: rgba(255,255,255,0.16);
    transform: translateY(-50%);
  }
  .seq-point {
    position: absolute;
    top: 38%;
    width: 22px; height: 22px;
    margin-left: -11px;
    border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 1px solid var(--panel-edge);
    transform: translateY(-50%);
    touch-action: manipulation;
  }
  .seq-point.active { background: var(--accent); border-color: var(--accent); }
  .seq-date {
    position: absolute;
    top: calc(38% + 20px);
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.01em;
    color: var(--ink-dim);
    white-space: nowrap;
    pointer-events: none;
  }
  .seq-date.active { color: var(--ink); }

  /* ---------- compact overlay nav: plain triangles sitting just beside the frame ---------- */
  .tile-frame.frame-overlaynav { overflow: visible; }
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
    z-index: 5;
    touch-action: manipulation;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6));
  }
  .nav-arrow.nav-prev {
    left: -16px;
    border-right: 20px solid var(--ink);
  }
  .nav-arrow.nav-next {
    right: -16px;
    border-left: 20px solid var(--ink);
  }

  /* ---------- map row: DIN-A/5:4 frame + tab column sitting OUTSIDE it ---------- */
  .map-row {
    display: flex;
    flex-shrink: 0;
  }

  .layer-tabs {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #161616;
    border: 1px solid var(--panel-edge);
    border-left: none;
  }
  .layer-tab {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px 8px;
    font-size: 19px;
    line-height: 1.2;
    letter-spacing: 0.01em;
    color: var(--ink-dim);
    border-bottom: 1px solid var(--panel-edge);
    border-left: 4px solid transparent;
    touch-action: manipulation;
  }
  .layer-tab:last-child { border-bottom: none; }
  .layer-tab.active {
    color: var(--ink);
    background: rgba(255,255,255,0.06);
    border-left: 4px solid var(--accent);
  }

  /* "eco upgrade" is a normal tab like any other; its 2x2 sub-grid flies
     out to the right, only while this tab is the active one */
  .layer-tab.gap-before { margin-top: 40px; position: relative; }
  .layer-tab.gap-before::before {
    content: '';
    position: absolute;
    top: -20px; left: 14px; right: 14px;
    border-top: 1px solid var(--panel-edge);
  }

  .layer-subgrid {
    position: absolute;
    top: 0; left: 100%;
    height: 100%;
    width: 220px;
    display: none;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    background: #161616;
    border: 1px solid var(--panel-edge);
    border-left: none;
    z-index: 50;
    box-shadow: 20px 0 40px -10px rgba(0,0,0,0.7);
  }
  .layer-tab.active .layer-subgrid { display: grid; }
  .layer-subgrid-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    color: var(--ink-dim);
    border-right: 1px solid var(--panel-edge);
    border-top: 1px solid var(--panel-edge);
    touch-action: manipulation;
  }
  .layer-subgrid-cell:nth-child(2n) { border-right: none; }
  .layer-subgrid-cell.active {
    color: var(--ink);
    background: rgba(255,255,255,0.1);
  }

  /* ---------- fixed reset button, unaffected by canvas zoom/pan ---------- */
  #reset-btn {
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 20;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(27,27,27,0.92);
    border: 1px solid var(--panel-edge);
    color: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.5);
    touch-action: manipulation;
  }
  #reset-btn svg { width: 20px; height: 20px; fill: none; stroke: var(--ink); stroke-width: 1.6; }
  #reset-btn span {
    font-size: 9px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
</style>
</head>
<body>

<div id="backdrop"></div>
<div class="tick tl">52.538503 N · 13.359849 E</div>
<div class="tick tr">52.774927 N · 13.52574 E</div>
<div class="tick bl">COMPENSATION LAB e.V.</div>

<div id="stage">
  <div id="canvas"><!-- items injected by JS from CONFIG --></div>
</div>

<button id="reset-btn" aria-label="Zur Ausgangsansicht">
  <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 3 6.7"/><path d="M3 3v6h6"/></svg>
  <span>Reset</span>
</button>

<script>
/* ============================================================
   INHALT ANPASSEN

   Zwei Kachel-Typen:

   1) "sequence" — vier Bilder, per Zeitstrahl (ein Punkt pro Bild,
      mit Datumstext darunter) einzeln anwählbar, plus Play-Button.
      Titel-Balken und Zeitstrahl sitzen AUSSERHALB des eigentlichen
      Bild-Rahmens, sodass der Rahmen selbst ein sauberes DIN-A-
      Verhältnis behält.
      images: ["bild1.jpg", ...] (4 Stück)
      dates:  ["1990","2005","2015","2024"] (Text unter jedem Punkt)
      finance: optional — Dateiname für eine zusätzliche "Finance"-
               Ebene, per eigenem Button oben rechts im Rahmen
               anwählbar (unabhängig vom Zeitstrahl)
      ratio:  Breite/Höhe des Rahmens — 1.41421 für Querformat (Plan),
              0.70711 für Hochformat (Bogensee plan/axo)
      w:      Breite des Rahmens in Pixel (Höhe ergibt sich aus ratio)
      x,y:    Position auf der Leinwand

   2) "layered" — Karte mit Reitern, die AUSSERHALB des 5:4-Karten-
      rahmens sitzen (rechte Spalte). Ein Eintrag kann statt einem
      einfachen "src" ein "subGrid"-Array haben (6 Einträge, 2x3-
      Raster) — das ist für "Eco Value": die Karte selbst hat ein
      eigenes Bild UND sechs Unter-Karten, macht zusammen 7 Karten.
      "gapBefore: true" fügt einen kleinen Abstand davor ein.

   3) "image" — ein einzelnes statisches Bild, nur Titel + Rahmen,
      kein Zeitstrahl/keine Reiter (z.B. die kleinen "Verortung"-
      Kacheln).
      src: Dateiname
      ratio, w, x, y: wie oben

   ============================================================ */

const TITLE_H = 56, CTRL_GAP = 20, CTRL_H = 90, TABS_W = 230;
const RATIO_LANDSCAPE = 1.41421, RATIO_PORTRAIT = 0.70711, RATIO_MAP = 1.25;
const RATIO_AXO_LEA = 7441 / 9345;             // reale Rahmenmaße Axo Lea (Mettmannplatz)
const RATIO_AXO_BOGENSEE = 9246 / 7987;        // reale Rahmenmaße Axo Bogensee

const CONFIG = [

  {
    type: "sequence",
    label: "Mettmannplatz axo",
    images: ["lea-axo-1.jpg", "lea-axo-2.jpg", "lea-axo-3.jpg", "lea-axo-4.jpg"],
    dates: ["spring", "summer", "autumn", "winter"],
    ratio: RATIO_AXO_LEA, w: 510,
    x: 380, y: 458
  },
  {
    type: "image",
    label: "overview Mettmannplatz",
    src: "overview-mettmannplatz.jpg",
    ratio: 1.6, w: 320,
    x: 380, y: 1290
  },
  {
    type: "sequence",
    label: "Mettmannplatz plan",
    images: ["lea-plan-1.jpg", "lea-plan-2.jpg", "lea-plan-3.jpg", "lea-plan-4.jpg", "lea-plan-5.jpg"],
    dates: ["2026", "2032", "2037", "2042", "after 2052"],
    finance: "lea-plan-finance.jpg",
    ratio: RATIO_LANDSCAPE, w: 990,
    x: 755, y: 1290
  },
  {
    type: "layered",
    label: "Map",
    ratio: RATIO_MAP, w: 1235,
    layers: [
      { src: "typology.jpg", tab: "typology" },
      { src: "analysis.jpg", tab: "analysis" },
      {
        src: "eco.jpg",
        tab: "ecological upgrade",
        gapBefore: true,
        subGrid: [
          { src: "eco1.jpg", tab: "I" },
          { src: "eco2.jpg", tab: "II" },
          { src: "eco3.jpg", tab: "III" },
          { src: "eco4.jpg", tab: "IV" }
        ]
      },
      { src: "weakness.jpg", tab: "weakness" },
      { src: "state.owned.jpg", tab: "state owned" }
    ],
    x: 1225, y: 185
  },
  {
    type: "sequence",
    label: "Axo bogensee",
    images: ["bogensee-axo-1.jpg", "bogensee-axo-2.jpg", "bogensee-axo-3.jpg", "bogensee-axo-4.jpg"],
    dates: ["spring", "summer", "autumn", "winter"],
    ratio: RATIO_AXO_BOGENSEE, w: 815,
    x: 2005, y: 1290
  },
  {
    type: "sequence",
    label: "Bogensee plan",
    images: ["bogensee-plan-1.jpg", "bogensee-plan-2.jpg", "bogensee-plan-3.jpg", "bogensee-plan-4.jpg", "bogensee-plan-5.jpg"],
    dates: ["2026", "2032", "2037", "2042", "after 2052"],
    finance: "bogensee-plan-finance.jpg",
    ratio: RATIO_PORTRAIT, w: 650,
    x: 2925, y: 795
  },
  {
    type: "image",
    label: "overview Bogensee",
    src: "overview-bogensee.jpg",
    ratio: 1.6, w: 325,
    x: 2925, y: 1900
  }
];

/* ============================================================
   Ab hier nichts mehr anpassen (Logik für Zoom/Pan/Play/Reiter)
   ============================================================ */
const CANVAS_W = 3840, CANVAS_H = 2160;
// Zoom-out knob (kept at 1 — the permanent page-level `zoom` in the CSS above
// now does the "smaller + pushed together" effect for the whole page).
const SIZE_SCALE = 1;
const canvas = document.getElementById('canvas');
const stage = document.getElementById('stage');

// Prevent the browser's own page-zoom (trackpad pinch / ctrl+scroll / Safari
// gesture events) from engaging — otherwise it fights with our custom canvas
// zoom and can visually detach "position: fixed" elements like the reset
// button. Instead, we redirect trackpad pinch into our own canvas zoom, so
// testing on a laptop trackpad behaves the same as pinching on the real
// touchscreen.
function zoomAt(clientX, clientY, newScaleRaw) {
  const newScale = Math.max(MIN_SCALE, Math.min(newScaleRaw, MAX_SCALE));
  const rect = stage.getBoundingClientRect();
  const mx = clientX - rect.left, my = clientY - rect.top;
  const canvasX = (mx - tx) / scale;
  const canvasY = (my - ty) / scale;
  tx = mx - canvasX * newScale;
  ty = my - canvasY * newScale;
  scale = newScale;
  applyTransform();
}

document.addEventListener('wheel', (e) => {
  if (e.ctrlKey) {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.01);
    zoomAt(e.clientX, e.clientY, scale * factor);
  }
}, { passive: false });

let gestureBaseScale = 1;
document.addEventListener('gesturestart', (e) => {
  e.preventDefault();
  gestureBaseScale = scale;
});
document.addEventListener('gesturechange', (e) => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, gestureBaseScale * e.scale);
});
document.addEventListener('gestureend', (e) => e.preventDefault());

const PLAY_SVG = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const PAUSE_SVG = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

// per-tile runtime state for sequence players
const sequenceState = new WeakMap();

CONFIG.forEach((entry) => {
  const w = Math.round(entry.w * SIZE_SCALE);
  const frameH = Math.round(w / entry.ratio);
  let totalW, totalH;
  if (entry.type === 'sequence') {
    totalW = w;
    totalH = entry.overlayNav
      ? TITLE_H + frameH
      : TITLE_H + frameH + CTRL_GAP + CTRL_H;
  } else if (entry.type === 'layered') {
    totalW = w + TABS_W;
    totalH = TITLE_H + frameH;
  } else { // "image"
    totalW = w;
    totalH = TITLE_H + frameH;
  }

  const item = document.createElement('div');
  item.className = 'item';
  item.style.left = entry.x + 'px';
  item.style.top = entry.y + 'px';
  item.style.width = totalW + 'px';
  item.style.height = totalH + 'px';

  const inner = document.createElement('div');
  inner.className = 'item-inner';
  item.appendChild(inner);

  const titleEl = document.createElement('div');
  titleEl.className = 'tile-title';
  titleEl.textContent = entry.label;
  inner.appendChild(titleEl);

  if (entry.type === 'sequence') {
    const frame = document.createElement('div');
    frame.className = 'tile-frame' + (entry.overlayNav ? ' frame-overlaynav' : '');
    frame.style.height = frameH + 'px';

    const imgEls = entry.images.map((src, i) => {
      const img = document.createElement('img');
      img.className = 'frame-img' + (i === 0 ? ' active' : '');
      img.src = src;
      img.alt = entry.label + ' – Bild ' + (i + 1);
      frame.appendChild(img);
      return img;
    });

    let playBtn = null, pointEls = [], timeline = null;
    let navPrev = null, navNext = null, counterEl = null;

    if (entry.overlayNav) {
      // compact nav: plain triangles, sitting just beside the frame, barely overlapping it
      navPrev = document.createElement('div');
      navPrev.className = 'nav-arrow nav-prev';
      frame.appendChild(navPrev);

      navNext = document.createElement('div');
      navNext.className = 'nav-arrow nav-next';
      frame.appendChild(navNext);

      inner.appendChild(frame);
    } else {
      const controls = document.createElement('div');
      controls.className = 'seq-controls';
      controls.style.marginTop = CTRL_GAP + 'px';

      if (!entry.noPlay) {
        playBtn = document.createElement('div');
        playBtn.className = 'seq-play-btn';
        playBtn.innerHTML = PLAY_SVG;
      }

      timeline = document.createElement('div');
      timeline.className = 'seq-timeline';
      const line = document.createElement('div');
      line.className = 'seq-line';
      timeline.appendChild(line);

      const n = imgEls.length;
      imgEls.forEach((_, i) => {
        const leftExpr = 'calc(22px + (100% - 44px) * ' + (i / (n - 1)) + ')';

        const pt = document.createElement('div');
        pt.className = 'seq-point' + (i === 0 ? ' active' : '');
        pt.style.left = leftExpr;
        timeline.appendChild(pt);
        pointEls.push(pt);

        const dateLabel = document.createElement('div');
        dateLabel.className = 'seq-date' + (i === 0 ? ' active' : '');
        dateLabel.style.left = leftExpr;
        dateLabel.textContent = (entry.dates && entry.dates[i]) || ('Datum ' + (i + 1));
        timeline.appendChild(dateLabel);
      });

      if (playBtn) controls.appendChild(playBtn);
      controls.appendChild(timeline);
      inner.appendChild(frame);
      inner.appendChild(controls);
    }

    let financeImg = null, financeBtn = null;
    if (entry.finance) {
      financeImg = document.createElement('img');
      financeImg.className = 'frame-img';
      financeImg.src = entry.finance;
      financeImg.alt = entry.label + ' – Finance';
      frame.appendChild(financeImg);

      financeBtn = document.createElement('div');
      financeBtn.className = 'finance-btn';
      financeBtn.textContent = 'Finance';
      titleEl.appendChild(financeBtn);
    }

    sequenceState.set(item, {
      imgEls, tickEls: pointEls, dateEls: timeline ? timeline.querySelectorAll('.seq-date') : [],
      playBtn, idx: 0, playing: false, timer: null,
      financeImg, financeBtn, financeActive: false,
      navPrev, navNext, counterEl
    });

  } else if (entry.type === 'layered') {
    const row = document.createElement('div');
    row.className = 'map-row';
    row.style.height = frameH + 'px';

    const frame = document.createElement('div');
    frame.className = 'tile-frame';
    frame.style.width = w + 'px';
    frame.style.height = '100%';

    const tabsCol = document.createElement('div');
    tabsCol.className = 'layer-tabs';
    tabsCol.style.width = TABS_W + 'px';
    tabsCol.style.height = '100%';

    let firstAssigned = false;

    entry.layers.forEach((layer) => {
      const img = document.createElement('img');
      img.className = 'frame-img' + (!firstAssigned ? ' active' : '');
      img.src = layer.src;
      img.alt = layer.tab;
      frame.appendChild(img);

      const tab = document.createElement('div');
      tab.className = 'layer-tab' + (layer.gapBefore ? ' gap-before' : '');
      tab.textContent = layer.tab;
      tab._img = img;
      if (!firstAssigned) { tab.classList.add('active'); firstAssigned = true; }

      if (layer.subGrid) {
        const grid = document.createElement('div');
        grid.className = 'layer-subgrid';
        layer.subGrid.forEach((sub) => {
          const simg = document.createElement('img');
          simg.className = 'frame-img';
          simg.src = sub.src;
          simg.alt = sub.tab;
          frame.appendChild(simg);

          const cell = document.createElement('div');
          cell.className = 'layer-subgrid-cell';
          cell.textContent = sub.tab;
          cell._img = simg;
          grid.appendChild(cell);
        });
        tab.appendChild(grid);
      }
      tabsCol.appendChild(tab);
    });

    row.appendChild(frame);
    row.appendChild(tabsCol);
    inner.appendChild(row);

  } else if (entry.type === 'image') {
    const frame = document.createElement('div');
    frame.className = 'tile-frame';
    frame.style.height = frameH + 'px';

    const img = document.createElement('img');
    img.className = 'frame-img active';
    img.src = entry.src;
    img.alt = entry.label;
    frame.appendChild(img);

    inner.appendChild(frame);
  }

  canvas.appendChild(item);
});

// --- sequence player logic ---
function seqSetActive(state, idx) {
  state.idx = idx;
  if (state.financeActive) {
    state.financeActive = false;
    if (state.financeImg) state.financeImg.classList.remove('active');
    if (state.financeBtn) state.financeBtn.classList.remove('active');
  }
  state.imgEls.forEach((im, k) => im.classList.toggle('active', k === idx));
  state.tickEls.forEach((t, k) => t.classList.toggle('active', k === idx));
  state.dateEls.forEach((d, k) => d.classList.toggle('active', k === idx));
  if (state.counterEl) state.counterEl.textContent = (idx + 1) + ' / ' + state.imgEls.length;
}
function seqStart(state) {
  if (state.playing) return;
  state.playing = true;
  state.playBtn.innerHTML = PAUSE_SVG;
  state.timer = setInterval(() => {
    seqSetActive(state, (state.idx + 1) % state.imgEls.length);
  }, 1100);
}
function seqStop(state) {
  state.playing = false;
  state.playBtn.innerHTML = PLAY_SVG;
  clearInterval(state.timer);
}
function financeToggle(state) {
  state.financeActive = !state.financeActive;
  if (state.financeActive) {
    seqStop(state);
    state.imgEls.forEach((im) => im.classList.remove('active'));
    state.financeImg.classList.add('active');
    state.financeBtn.classList.add('active');
  } else {
    state.financeImg.classList.remove('active');
    state.financeBtn.classList.remove('active');
    state.imgEls[state.idx].classList.add('active');
  }
}

// --- layered-map selection: one shared "active" state across all tabs
// and sub-grid cells within a tile, whichever was tapped last ---
function mapSelect(item, chosenEl) {
  item.querySelectorAll('.layer-tab').forEach((t) => t.classList.remove('active'));
  item.querySelectorAll('.layer-subgrid-cell').forEach((c) => c.classList.remove('active'));
  const parentTab = chosenEl.classList.contains('layer-tab') ? chosenEl : chosenEl.closest('.layer-tab');
  if (parentTab) parentTab.classList.add('active');
  chosenEl.classList.add('active');
  item.querySelectorAll('.frame-img').forEach((im) => im.classList.toggle('active', im === chosenEl._img));
}

// --- pan & zoom (pointer-events based, multi-touch pinch) ---
let scale = 1, tx = 0, ty = 0;
const MIN_SCALE = 0.35, MAX_SCALE = 8;
const pointers = new Map();
let dragMoved = false;
let lastDist = null;
let lastSingle = null;

function applyTransform() {
  canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function centerCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const fitScale = Math.min(vw / CANVAS_W, vh / CANVAS_H);
  scale = Math.max(MIN_SCALE, Math.min(fitScale, MAX_SCALE));
  tx = (vw - CANVAS_W * scale) / 2;
  ty = (vh - CANVAS_H * scale) / 2;
  applyTransform();
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function mid(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

stage.addEventListener('pointerdown', (e) => {
  stage.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  dragMoved = false;
  if (pointers.size === 1) {
    lastSingle = { x: e.clientX, y: e.clientY };
  } else if (pointers.size === 2) {
    const pts = Array.from(pointers.values());
    lastDist = dist(pts[0], pts[1]);
  }
});

stage.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1 && lastSingle) {
    const dx = e.clientX - lastSingle.x;
    const dy = e.clientY - lastSingle.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    tx += dx; ty += dy;
    lastSingle = { x: e.clientX, y: e.clientY };
    applyTransform();
  } else if (pointers.size === 2) {
    const pts = Array.from(pointers.values());
    const d = dist(pts[0], pts[1]);
    const m = mid(pts[0], pts[1]);
    if (lastDist) {
      const factor = d / lastDist;
      const newScale = Math.max(MIN_SCALE, Math.min(scale * factor, MAX_SCALE));
      const rect = stage.getBoundingClientRect();
      const mx = m.x - rect.left, my = m.y - rect.top;
      const canvasX = (mx - tx) / scale;
      const canvasY = (my - ty) / scale;
      tx = mx - canvasX * newScale;
      ty = my - canvasY * newScale;
      scale = newScale;
      dragMoved = true;
      applyTransform();
    }
    lastDist = d;
  }
});

function endPointer(e) {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) { lastDist = null; }
  if (pointers.size === 1) {
    lastSingle = Array.from(pointers.values())[0];
  } else if (pointers.size === 0) {
    lastSingle = null;
  }
}

// Unified tap handling: the stage holds pointer capture (needed for smooth
// pan/pinch), so a plain "click" on a nested control is not reliable across
// browsers/input types. Instead we look up what's actually under the
// pointer at release time and act on it directly.
let lastTap = 0;

function handlePointerUp(e) {
  const wasSinglePointer = pointers.size === 1;
  endPointer(e);

  if (!wasSinglePointer || dragMoved) { lastTap = 0; return; }

  const target = document.elementFromPoint(e.clientX, e.clientY);
  let hitInteractive = false;

  if (target) {
    const cellEl = target.closest('.layer-subgrid-cell');
    const tabEl = !cellEl ? target.closest('.layer-tab') : null;
    const financeBtnEl = target.closest('.finance-btn');
    const playBtnEl = !financeBtnEl ? target.closest('.seq-play-btn') : null;
    const tickEl = !playBtnEl && !financeBtnEl ? target.closest('.seq-point') : null;
    const navPrevEl = !tickEl && !playBtnEl && !financeBtnEl ? target.closest('.nav-prev') : null;
    const navNextEl = !navPrevEl && !tickEl && !playBtnEl && !financeBtnEl ? target.closest('.nav-next') : null;

    if (cellEl) {
      hitInteractive = true;
      mapSelect(cellEl.closest('.item'), cellEl);
    } else if (tabEl) {
      hitInteractive = true;
      mapSelect(tabEl.closest('.item'), tabEl);
    } else if (financeBtnEl) {
      hitInteractive = true;
      const item = financeBtnEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) { financeToggle(state); }
    } else if (playBtnEl) {
      hitInteractive = true;
      const item = playBtnEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) { state.playing ? seqStop(state) : seqStart(state); }
    } else if (tickEl) {
      hitInteractive = true;
      const item = tickEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) {
        const idx = state.tickEls.indexOf(tickEl);
        seqStop(state);
        seqSetActive(state, idx);
      }
    } else if (navPrevEl) {
      hitInteractive = true;
      const item = navPrevEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) seqSetActive(state, (state.idx - 1 + state.imgEls.length) % state.imgEls.length);
    } else if (navNextEl) {
      hitInteractive = true;
      const item = navNextEl.closest('.item');
      const state = sequenceState.get(item);
      if (state) seqSetActive(state, (state.idx + 1) % state.imgEls.length);
    }
  }

  if (!hitInteractive) {
    const now = Date.now();
    if (now - lastTap < 300) centerCanvas();
    lastTap = now;
  } else {
    lastTap = 0;
  }
}

stage.addEventListener('pointerup', handlePointerUp);
stage.addEventListener('pointercancel', endPointer);

document.getElementById('reset-btn').addEventListener('click', centerCanvas);
window.addEventListener('resize', centerCanvas);
centerCanvas();
</script>
</body>
</html>
